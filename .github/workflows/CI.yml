name: Deploy Astro to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: write

concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  check:
    name: Astro Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Enable corepack
        run: corepack enable
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.22.0
          run_install: false
      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: |
            ~/.pnpm-store
            node_modules
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libvips-dev build-essential
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run Astro Check
        run: pnpm astro check
        env:
          ENABLE_CONTENT_SYNC: false

  build-and-deploy:
    name: Build and Deploy
    needs: check
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable corepack
        run: corepack enable

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.22.0
          run_install: false

      - name: Install ffmpeg
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: |
            ~/.pnpm-store
            node_modules
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libvips-dev build-essential

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download latest music playlist
        run: node scripts/download-music.js

      - name: Fetch latest Bangumi data
        run: pnpm update-anime
        env:
          CI: true
          BANGUMI_ACCESS_TOKEN: ${{ secrets.BANGUMI_ACCESS_TOKEN }}

      - name: Run Astro Build
        run: pnpm build
        env:
          BASE_PATH: "/vedarublog.github.io/"
          PUBLIC_URL: "https://${{ github.repository_owner }}.github.io/vedarublog.github.io"

      - name: Verify build output
        run: |
          echo "=== playlist.json in build ==="
          cat dist/assets/music/playlist.json | head -5 || echo "NOT FOUND"
          echo "=== dist contents ==="
          ls -la dist/

      - name: Create .nojekyll
        run: touch dist/.nojekyll

      - name: Create 404 page
        run: |
          if [ -f "dist/index.html" ]; then
            cp dist/index.html dist/404.html
          fi

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist
          retention-days: 1

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Display deployment info
        run: |
          echo "🎉 部署成功！"
          echo "🌐 https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
