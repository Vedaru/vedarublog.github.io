name: Deploy Astro to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

# 不用 cancel-in-progress：download-music 会 commit+push 触发新 run，
# 旧 run 继续跑完也不影响（第二次 deploy 覆盖第一次）
concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: false

jobs:
  download-and-commit:
    name: Download Music & Commit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10.22.0"

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://github.com/${{ github.repository }}.git

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch Bangumi & download music (parallel)
        run: |
          pnpm update-anime &
          PID_BANGUMI=$!
          node scripts/download-music.js &
          PID_MUSIC=$!
          wait $PID_BANGUMI $PID_MUSIC
        env:
          CI: true
          BANGUMI_ACCESS_TOKEN: ${{ secrets.BANGUMI_ACCESS_TOKEN }}

      - name: Commit and push changes
        run: |
          git add -A public/assets/music/ src/data/bangumi-data.json public/assets/anime/cover/ || true

          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          # 防循环：如果最新 commit 已经是自动更新，跳过
          LATEST_MSG=$(git log -1 --pretty=%B 2>/dev/null || true)
          if echo "$LATEST_MSG" | grep -qE '^chore: update (music|bangumi)'; then
            echo "Skipping — latest commit is already an automated update"
            exit 0
          fi

          git commit -m "chore: update music & bangumi data (automated)"
          git pull --rebase origin main
          git push origin HEAD:main

  check:
    name: Astro Check
    needs: download-and-commit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Pull 拿到 download-and-commit 刚推的代码
      - name: Pull latest main
        run: |
          git remote set-url origin https://github.com/${{ github.repository }}.git
          git pull --rebase origin main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable corepack
        run: corepack enable

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.22.0
          run_install: false

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: |
            ~/.pnpm-store
            node_modules
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libvips-dev build-essential

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Astro Check
        run: pnpm astro check
        env:
          ENABLE_CONTENT_SYNC: false

  build-and-deploy:
    name: Build and Deploy to GitHub Pages
    needs: check
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Pull 拿到 download-and-commit 刚推的代码
      - name: Pull latest main
        run: |
          git remote set-url origin https://github.com/${{ github.repository }}.git
          git pull --rebase origin main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable corepack
        run: corepack enable

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.22.0
          run_install: false

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: |
            ~/.pnpm-store
            node_modules
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libvips-dev build-essential

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Astro Build
        run: pnpm build
        env:
          BASE_PATH: "/vedarublog.github.io/"
          PUBLIC_URL: "https://${{ github.repository_owner }}.github.io/vedarublog.github.io"

      - name: Create .nojekyll
        run: touch dist/.nojekyll

      - name: Create 404 page
        run: |
          if [ -f "dist/index.html" ]; then
            cp dist/index.html dist/404.html
          fi

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist
          retention-days: 1

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
