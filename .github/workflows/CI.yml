name: Deploy Astro to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  workflow_run:
    workflows: ["Download and Commit Music"]
    types: [completed]

permissions:
  contents: write
  pages: write
  id-token: write
  actions: write

concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  download-music:
    name: Download Music
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10.22.0'
      - name: Install ffmpeg (if missing)
        run: |
          if ! command -v ffmpeg >/dev/null 2>&1; then
            sudo apt-get update && sudo apt-get install -y ffmpeg
          fi
      - name: Disable bin links in pnpm (workaround for missing binary sources)
        run: |
          pnpm config set bin-links false
      - name: Configure Git to use HTTPS for GitHub
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile
      - name: Run download script
        run: |
          node --version
          ffmpeg -version || true
          node scripts/download-music.js

      - name: Commit and push downloaded music (if any)
        run: |
          # 1. Set remote to HTTPS for pushing first
          git remote set-url origin https://github.com/Vedaru/vedarublog.github.io.git

          # 2. Stage all music changes (including deletions like .m4a)
          # We must stage/commit BEFORE pulling to avoid "unstaged changes" error during rebase
          git add -A public/assets/music public/music || true

          # 3. If no staged changes, skip
          if git diff --staged --quiet; then
            echo "No music changes to commit"
            exit 0
          fi

          # 4. Prevent commit loops: if the latest commit message indicates an automated music update, skip
          LATEST_MSG=$(git log -1 --pretty=%B 2>/dev/null || true)
          echo "Latest commit message: $LATEST_MSG"
          if echo "$LATEST_MSG" | grep -q -E '^chore:.*music'; then
            echo "Skipping commit because latest commit is an automated music update"
            exit 0
          fi

          # 5. Commit changes locally
          git -c user.name="Vedaru" -c user.email="Vedaru@users.noreply.github.com" commit -m "chore: update music — replace m4a with mp3 (automated)"

          # 6. Pull latest changes from remote and rebase our new commit on top
          # This handles the case where main updated while this job was running
          git pull --rebase origin main

          # 7. Push the unified history
          git push origin HEAD:main

  update-bangumi:
    name: Update Bangumi Data
    runs-on: ubuntu-latest
    needs: download-music
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10.22.0"

      - name: Configure Git to use HTTPS for GitHub
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch Bangumi collections
        run: pnpm update-anime
        env:
          CI: true
          BANGUMI_ACCESS_TOKEN: ${{ secrets.BANGUMI_ACCESS_TOKEN }}

      - name: Commit and push bangumi-data.json (if changed)
        run: |
          git remote set-url origin https://github.com/${{ github.repository }}.git

          git add src/data/bangumi-data.json

          if git diff --staged --quiet; then
            echo "No Bangumi data changes to commit"
            exit 0
          fi

          LATEST_MSG=$(git log -1 --pretty=%B 2>/dev/null || true)
          echo "Latest commit message: $LATEST_MSG"
          if echo "$LATEST_MSG" | grep -q -E '^chore:.*bangumi'; then
            echo "Skipping commit because latest commit is an automated bangumi update"
            exit 0
          fi

          git -c user.name="github-actions[bot]" -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
            commit -m "chore: update bangumi-data.json (automated)"

          git pull --rebase origin main
          git push origin HEAD:main

  check:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    name: Astro Check
    runs-on: ubuntu-latest
    needs: [download-music, update-bangumi]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable corepack (makes pnpm available)
        run: corepack enable

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.22.0
          run_install: false

      - name: Verify pnpm installation
        run: |
          echo "PNPM版本:"
          pnpm --version
          echo "Node版本:"
          node --version

      - name: Force git to use HTTPS for GitHub
        run: |
          echo "Rewriting git@github.com: to https://github.com/ to avoid SSH cloning failures"
          git config --global url."https://github.com/".insteadOf git@github.com:

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: |
            ~/.pnpm-store
            node_modules
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install system dependencies (libvips)
        run: |
          sudo apt-get update
          sudo apt-get install -y libvips-dev build-essential

      - name: Install dependencies
        env:
          CI: true
          DISABLE_OPENCOLLECTIVE: 1
          NPM_CONFIG_UPDATE_NOTIFIER: false
        run: pnpm install --frozen-lockfile

      - name: Run Astro Check
        run: pnpm astro check
        env:
          ENABLE_CONTENT_SYNC: false

  build-and-deploy:
    name: Build and Deploy
    needs: check
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Cleanup previous artifacts
        uses: actions/github-script@v7
        with:
          script: |
            const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId,
            });
            
            const githubPagesArtifacts = artifacts.data.artifacts.filter(
              (artifact) => artifact.name === 'github-pages'
            );
            
            if (githubPagesArtifacts.length > 1) {
              console.log(`Found ${githubPagesArtifacts.length} github-pages artifacts, cleaning up...`);
              
              // Keep only the most recent one
              githubPagesArtifacts.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
              
              for (let i = 1; i < githubPagesArtifacts.length; i++) {
                console.log(`Deleting artifact: ${githubPagesArtifacts[i].id}`);
                await github.rest.actions.deleteArtifact({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  artifact_id: githubPagesArtifacts[i].id,
                });
              }
            }

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable corepack (makes pnpm available)
        run: corepack enable

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.22.0
          run_install: false

      - name: Verify pnpm installation
        run: |
          echo "PNPM版本:"
          pnpm --version
          echo "Node版本:"
          node --version
          echo "当前目录:"
          pwd
          ls -la

      - name: Force git to use HTTPS for GitHub
        run: |
          echo "Rewriting git@github.com: to https://github.com/ to avoid SSH cloning failures"
          git config --global url."https://github.com/".insteadOf git@github.com:

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: |
            ~/.pnpm-store
            node_modules
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install system dependencies (libvips)
        run: |
          sudo apt-get update
          sudo apt-get install -y libvips-dev build-essential

      - name: Install dependencies
        env:
          CI: true
          DISABLE_OPENCOLLECTIVE: 1
          NPM_CONFIG_UPDATE_NOTIFIER: false
        run: |
          echo "安装依赖..."
          pnpm install --frozen-lockfile
          echo "依赖安装完成"

      - name: Run Astro Build
        run: |
          echo "开始构建 Astro 项目..."
          echo "仓库名: ${{ github.event.repository.name }}"
          echo "BASE_PATH 环境变量: $BASE_PATH"
          pnpm build
        env:
          # Project site path: https://<user>.github.io/vedarublog.github.io/
          BASE_PATH: "/vedarublog.github.io/"
          PUBLIC_URL: "https://${{ github.repository_owner }}.github.io/vedarublog.github.io"

      - name: Verify build output
        run: |-
          echo "=== 验证构建输出 ==="
          echo "当前目录: $(pwd)"
          echo "dist目录内容:"
          ls -la dist/
          echo ""
          echo "检查 index.html:"
          if [ -f "dist/index.html" ]; then
            echo "✅ index.html 存在"
            echo "文件大小: $(du -h dist/index.html | cut -f1)"
            echo "前5行内容:"
            head -5 dist/index.html
          else
            echo "❌ index.html 不存在，查找HTML文件:"
            find . -name "*.html" -type f
            # 创建临时 index.html
            echo "创建临时 index.html..."
            mkdir -p dist
            cat > dist/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html lang="zh-CN">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>Vedaru Blog - 部署成功</title>
              <style>
                  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; margin: 0; padding: 20px; background: linear-gradient(135deg, 0x667eea 0%, 0x764ba2 100%); min-height: 100vh; color: white; text-align: center; }
                  .container { max-width: 800px; margin: 100px auto; padding: 40px; background: rgba(255,255,255,0.1); border-radius: 20px; backdrop-filter: blur(10px); }
                  h1 { font-size: 3em; margin-bottom: 20px; }
                  .url { background: rgba(0,0,0,0.2); padding: 10px 20px; border-radius: 10px; display: inline-block; margin: 20px 0; font-family: monospace; font-size: 1.2em; }
                  .success { color: 0x4ade80; font-weight: bold; }
              </style>
          </head>
          <body>
              <div class="container">
                  <h1>🚀 部署成功！</h1>
                  <p class="success">GitHub Pages 工作正常</p>
                  <p>Astro 项目已成功部署到</p>
                  <div class="url">https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/</div>
                  <p>如果这是您第一次看到此页面，请检查：</p>
                  <ul style="text-align: left; display: inline-block;">
                      <li>1. Astro 构建配置是否正确</li>
                      <li>2. 是否有 .astro 页面文件</li>
                      <li>3. 构建是否生成实际内容</li>
                  </ul>
                  <p style="margin-top: 30px;">构建时间: <span id="time"></span></p>
                  <script>
                      document.getElementById('time').textContent = new Date().toLocaleString('zh-CN');
                  </script>
              </div>
          </body>
          </html>
          HTMLEOF
            echo "临时 index.html 已创建"
          fi
      
      - name: Create .nojekyll file
        run: |
          touch dist/.nojekyll
          echo "✅ 创建了 .nojekyll 文件"

      - name: Create 404 page for GitHub Pages
        run: |
          if [ -f "dist/index.html" ]; then
            cp dist/index.html dist/404.html
            echo "✅ 创建了 404.html 文件"
          else
            echo "⚠️ index.html 不存在，无法创建 404.html"
          fi

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist
          retention-days: 1

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
      
      - name: Display deployment info
        run: |
          echo "🎉 部署成功！"
          echo ""
          echo "=== 网站信息 ==="
          echo "🌐 主访问地址: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
          echo "🔗 GitHub Pages URL: ${{ steps.deployment.outputs.page_url }}"
          echo ""
          echo "=== 部署详情 ==="
          echo "📁 仓库: ${{ github.repository }}"
          echo "📦 包管理器: pnpm"
          echo "🎯 分支: ${{ github.ref_name }}"
          echo "⏰ 时间: $(date '+%Y-%m-%d %H:%M:%S %Z')"
          echo ""
          echo "💡 提示:"
          echo "1. 首次访问可能需要等待1-2分钟缓存更新"
          echo "2. 如果看到404，请尝试强制刷新 (Ctrl+F5 或 Cmd+Shift+R)"
          echo "3. 检查浏览器控制台是否有资源加载错误"