# 全自动 Netlify ↔ Cloudflare Pages 切换（无需手动改 DNS / Pages 面板）
#
# 定时任务默认 mode=auto，会：
#   1. 检测 Netlify credits / 站点可用性 / HTTPS 探测
#   2. 注册 Pages 自定义域名（www + apex）
#   3. 修改 Cloudflare DNS（CNAME + 橙云 proxied）
#
# Secrets:
#   CF_API_TOKEN       Zone DNS Edit（vedaru.cn）
#   CF_PAGES_API_TOKEN 可选；Account Cloudflare Pages Edit（与 CF_API_TOKEN 二选一或合并到同一 Token）
name: Netlify Traffic Switch

on:
  schedule:
    # 每 2 小时自动巡检（无需人工 Run workflow）
    - cron: "0 */2 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Traffic mode override"
        required: false
        default: "auto"
        type: choice
        options:
          - auto
          - netlify
          - cloudflare
      dry_run:
        description: "Dry run (no DNS changes)"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  switch-traffic:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run traffic switch
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_PAGES_API_TOKEN: ${{ secrets.CF_PAGES_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_PAGES_PROJECT: vedarublog-github-io
          CF_PAGES_CNAME: vedarublog-github-io.pages.dev
          CF_PAGES_REGISTER_APEX: "true"
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          NETLIFY_CNAME_TARGET: ${{ secrets.NETLIFY_CNAME_TARGET }}
          SITE_DOMAIN: vedaru.cn
          NETLIFY_MONTHLY_CREDITS: "300"
          NETLIFY_DEPLOY_CREDIT_COST: "15"
          NETLIFY_CREDITS_RESERVE: "45"
          NETLIFY_TRAFFIC_MODE: ${{ github.event.inputs.mode || 'auto' }}
          DRY_RUN: ${{ (github.event.inputs.dry_run == true || github.event.inputs.dry_run == 'true') && '1' || '' }}
        run: |
          echo "DRY_RUN env='${DRY_RUN:-}' (empty means real DNS update)"
          node scripts/netlify-traffic-switch.mjs

      - name: Commit traffic state (only when switched)
        if: ${{ github.event.inputs.dry_run != true && github.event.inputs.dry_run != 'true' }}
        run: |
          if [ ! -f .github/netlify-traffic-state.json ]; then
            echo "No state file update"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/netlify-traffic-state.json
          if git diff --staged --quiet; then
            exit 0
          fi
          TARGET=$(node -p "JSON.parse(require('fs').readFileSync('.github/netlify-traffic-state.json','utf8')).targetMode")
          git commit -m "chore: netlify traffic switched to ${TARGET} [skip netlify]"
          git pull --rebase origin main
          git push origin HEAD:main
